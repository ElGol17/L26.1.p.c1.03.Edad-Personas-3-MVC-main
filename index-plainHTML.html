<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Personas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card">

        <div class="card-header bg-primary text-white">
            Registro de Personas
        </div>

        <div class="card-body">

            <button class="btn btn-success" id="btNuevaPersona">
                Nueva Persona
            </button>

            <hr>

            <div id="salida"></div>

        </div>

    </div>

</div>


<div class="modal fade" id="modalPersona">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Agregar Persona</h5>
            </div>

            <div class="modal-body">

                <label>Nombre</label>
                <input type="text" id="inNombre" class="form-control mb-3">

                <label>Edad</label>
                <input type="number" id="inEdad" class="form-control">

            </div>

            <div class="modal-footer">

                <button class="btn btn-primary" id="btProcesar">
                    Procesar
                </button>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="./dist/main.js"></script>

</body>
</html>
